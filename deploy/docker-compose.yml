services:
  wizard-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: image-wizard-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    expose:
      - "3099"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3099/wizard',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    container_name: image-wizard-caddy
    restart: unless-stopped
    depends_on:
      wizard-app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-wizard.linzhiqing.dev}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
